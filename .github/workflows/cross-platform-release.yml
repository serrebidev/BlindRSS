name: Cross-Platform Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    if: ${{ github.event_name == 'push' }}
    name: Build Windows Artifact
    runs-on: windows-2022
    steps:
      - name: Check out current commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Windows build dependencies
        shell: powershell
        run: choco install vlc -y --no-progress

      - name: Build Windows package
        shell: cmd
        run: |
          set SKIP_SIGN=1
          call build.bat build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-windows-${{ github.sha }}
          path: dist/BlindRSS-v*.zip

  macos:
    name: Build macOS Artifact
    runs-on: macos-14
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS build dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Build macOS package
        env:
          BLINDRSS_VLC_VERSION: "3.0.23"
        run: |
          chmod +x build.sh
          ./build.sh build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlindRSS-macos-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.sha }}
          path: dist/BlindRSS-macos-*.zip

      - name: Upload release asset
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" dist/BlindRSS-macos-*.zip --clobber
